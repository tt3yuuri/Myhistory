<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./winter2.css" rel="stylesheet" type="text/css" />
    <script src="function.js" defer></script>
    <script src="winter.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


    <!--スライド型・ヘッダー写真表示（予定）-->
    <div class="position-relative">
        <div id="carouselExampleFade" class="carousel slide carousel-fade h-50 img-fluid" data-bs-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="headerimg/head1.webp" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
          <img src="headerimg/head2.webp" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
          <img src="headerimg/head3.webp" class="d-block w-100" alt="...">
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
        </div>
    </div>

    <!--<img src="logo6.png" alt="手前の画像" class="position-absolute" style="top: 0px; left: -185px; z-index: 2;">-->
    <picture>
        <source media="(max-width: 768px)" srcset="logo6.png">
        
        <img src="logo6.png" alt="Winter Album Header" class="header-img,position-absolute" style="top: 0px; left: -185px; z-index: 2;">
    </picture>
    </div>

    <title>MYHISTORY</title>
  </head>
  <body>

    <div id="snow">  

      <h3 class="text-center m-5">ここは、様々なジャンルの写真を集めたアルバムサイト“MYHISTORY”です。各カテゴリの下部にある薄い灰色の余白をクリックすると写真を見ることが出来ます。
      </h3>

      <!--カード型・アルバム一覧（予定）-->
      <div class="main py-5">
        <div class="timeline-container">

          <div class="timeline-marker start-marker">
            <i class="fa-solid fa-certificate"></i> 
          </div>


          <div class="timeline-node left">
              <div class="timeline-card card shadow-sm text-center">
                  <img src="static/album1/images/400/1-1.webp" class="card-img-top" alt="TOWN">
                  <div class="card-body">
                      <h5 class="card-title">TOWN</h5>
                      <h6 class="card-subtitle mb-2 text-muted">by Anna</h6>
                      <a href="static/album1/TOWN.html" class="btn btn-primary rounded-pill btn-light btn-outline-light">VIEW MORE</a>
                  </div>
              </div>
          </div>

          <div class="timeline-node right">
              <div class="timeline-card card shadow-sm text-center">
                  <img src="static/album2/images/400/1-1.webp" class="card-img-top" alt="BASEBALL">
                  <div class="card-body">
                      <h5 class="card-title">BASEBALL</h5>
                      <h6 class="card-subtitle mb-2 text-muted">by Eddy</h6>
                      <a href="static/album2/BASEBALL.html" class="btn btn-primary rounded-pill btn-light btn-outline-light">VIEW MORE</a>
                  </div>
              </div>
          </div>

          <div class="timeline-node left">
              <div class="timeline-card card shadow-sm text-center">
                  <img src="static/album3/images/400/1-1.webp" class="card-img-top" alt="FIREWORKS">
                  <div class="card-body">
                    <h5 class="card-title">FIREWORKS</h5>
                    <h6 class="card-subtitle mb-2 text-muted">by Riko</h6>
                    <a href="static/album3/FIREWORKS.html" class="btn btn-primary rounded-pill btn-light btn-outline-light">VIEW MORE</a>
                  </div>
              </div>
          </div>

          <div class="timeline-node right">
              <div class="timeline-card card shadow-sm text-center">
                  <img src="static/album4/images/400/1-1.webp" class="card-img-top" alt="FOOD">
                  <div class="card-body">
                      <h5 class="card-title">FOOD</h5>
                      <h6 class="card-subtitle mb-2 text-muted">by Jun</h6>
                      <a href="static/album4/FOOD.html" class="btn btn-primary rounded-pill btn-light btn-outline-light">VIEW MORE</a>
                  </div>
              </div>
          </div>

          <div class="timeline-marker end-marker">
            <i class="fa-brands fa-font-awesome"></i>
          </div>

        </div>

        <div class="container my-5 pb-5">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <div class="card shadow-sm post-form-card">
                <div class="card-body p-4 p-md-5">
                    <h3 class="card-title text-center mb-4">
                        <i class="fa-solid fa-pen-nib me-2"></i>新しいアルバムを記録する
                    </h3>
                    
                    <form id="album-post-form">
                        <div class="mb-3">
                            <label for="albumTitle" class="form-label">アルバムのタイトル</label>
                            <input type="text" class="form-control" id="albumTitle" placeholder="例：冬の散歩道" required>
                        </div>

                        <div class="mb-3">
                            <label for="albumDate" class="form-label">作成者(ニックネーム)</label>
                            <input type="text" class="form-control" id="nickname" placeholder="例：ハンバーガー大好き" required>
                        </div>

                        <div class="mb-4">
                            <label for="albumImage" class="form-label">画像を選択</label>
                            <input class="form-control" type="file" id="albumImage" accept="image/*">
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary rounded-pill px-5 album-link">
                                アルバムを追加する
                            </button>
                        </div>
                    </form>
                </div>
            </div>
          </div>
        </div>
        </div>

      </div>

      <audio class="bgm" src="stardust.mp3" loop></audio>
      <audio class="bgm" src="echo.mp3" loop></audio>
      <audio class="bgm" src="cyber.mp3" loop></audio>


      <div class="BGM-dropup">
        <button class="btn btn-secondary dropdown-toggle rounded-pill" type="button" id="dropdownMenuButton1" data-bs-toggle="dropdown" aria-expanded="false">
          ♪
        </button>
        <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton1">
          <li><a class="dropdown-item" href="#">STARDUST<button class="bgm-toggle" aria-label="stardust">▶</button></a></li>
          <li><a class="dropdown-item" href="#">ECHO<button class="bgm-toggle" aria-label="echo">▶</button></a></li>
          <li><a class="dropdown-item" href="#">CYBER<button class="bgm-toggle" aria-label="cyber">▶</button></a></li>
        </ul>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   </div>
  </body>
</html>
